<section class="report">
  <header class="report__head">
    <div>
      <h2 class="report__title">{{ title() }}</h2>
      @if (description()) {
        <p class="report__description">{{ description() }}</p>
      }
    </div>
    <div class="report__actions">
      <button mat-stroked-button (click)="exportXlsx()" [disabled]="!items().length">
        <mat-icon aria-hidden="true">table_view</mat-icon>
        Excel
      </button>
      <button mat-stroked-button (click)="exportPdf()" [disabled]="!items().length">
        <mat-icon aria-hidden="true">picture_as_pdf</mat-icon>
        PDF
      </button>
    </div>
  </header>

  @if (loading()) {
    <mat-progress-bar mode="indeterminate" [attr.aria-label]="'Cargando ' + title()" />
  } @else if (error()) {
    <div class="panel__state" role="alert">
      <mat-icon aria-hidden="true">cloud_off</mat-icon>
      <p>No se pudo cargar el reporte.</p>
    </div>
  } @else if (!items().length) {
    <div class="panel__state">
      <mat-icon aria-hidden="true">bar_chart</mat-icon>
      <p>Sin datos para este reporte.</p>
    </div>
  } @else {
    <div class="report__body">
      <div class="report__chart">
        <canvas baseChart [type]="chartType()" [data]="chartData()" [options]="chartOptions()"></canvas>
      </div>

      <div class="table-wrapper report__table">
        <table mat-table [dataSource]="items()">
          <ng-container matColumnDef="label">
            <th mat-header-cell *matHeaderCellDef>{{ labelHeader() }}</th>
            <td mat-cell *matCellDef="let item">{{ item.label }}</td>
          </ng-container>

          <ng-container matColumnDef="total">
            <th mat-header-cell *matHeaderCellDef class="report__total-col">Total</th>
            <td mat-cell *matCellDef="let item" class="report__total-col">{{ item.total }}</td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
        </table>
      </div>
    </div>
  }
</section>
