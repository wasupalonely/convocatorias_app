@if (user(); as currentUser) {
  <header class="dashboard__header">
    <p class="dashboard__role">{{ roleLabel() }}</p>
    <h1 class="dashboard__title">Hola, {{ currentUser.name }}</h1>
    <p class="dashboard__subtitle">Gestión de Convocatorias Institucionales — Universidad Surcolombiana.</p>
  </header>

  <section class="dashboard__grid" aria-label="Accesos rápidos">
    @for (card of cards(); track card.route) {
      <a class="card" [routerLink]="card.route">
        <span class="card__icon">
          <mat-icon aria-hidden="true">{{ card.icon }}</mat-icon>
        </span>
        <span class="card__body">
          <span class="card__title">{{ card.title }}</span>
          <span class="card__description">{{ card.description }}</span>
        </span>
        <mat-icon class="card__chevron" aria-hidden="true">chevron_right</mat-icon>
      </a>
    }
  </section>
}
