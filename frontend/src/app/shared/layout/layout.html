<div class="shell">
  <mat-toolbar class="shell__toolbar">
    @if (isHandset()) {
      <button mat-icon-button (click)="drawer.toggle()" aria-label="Abrir menú de navegación">
        <mat-icon aria-hidden="true">menu</mat-icon>
      </button>
    }

    <a class="shell__brand" routerLink="/inicio">
      <app-brand-mark [size]="32" />
      <span class="shell__brand-text">Convocatorias USCO</span>
    </a>

    <span class="shell__spacer"></span>

    @if (user(); as currentUser) {
      <div class="shell__user">
        <span class="shell__user-name">{{ currentUser.name }}</span>
        <span class="shell__user-role">{{ roleLabel() }}</span>
      </div>
    }

    <button mat-icon-button (click)="logout()" aria-label="Cerrar sesión">
      <mat-icon aria-hidden="true">logout</mat-icon>
    </button>
  </mat-toolbar>

  <mat-sidenav-container class="shell__container">
    <mat-sidenav
      #drawer
      class="shell__sidenav"
      [mode]="isHandset() ? 'over' : 'side'"
      [opened]="!isHandset()"
      [fixedInViewport]="isHandset()"
    >
      <nav class="shell__nav" aria-label="Navegación principal">
        <mat-nav-list>
          @for (item of navItems(); track item.route) {
            <a
              mat-list-item
              [routerLink]="item.route"
              routerLinkActive="shell__nav-item--active"
              (click)="isHandset() ? drawer.close() : null"
            >
              <mat-icon matListItemIcon aria-hidden="true">{{ item.icon }}</mat-icon>
              <span matListItemTitle>{{ item.label }}</span>
            </a>
          }
        </mat-nav-list>
      </nav>
    </mat-sidenav>

    <mat-sidenav-content class="shell__content-wrapper">
      <div class="shell__content">
        <router-outlet />
      </div>
    </mat-sidenav-content>
  </mat-sidenav-container>
</div>
